workflows:

  android-workflow:
    name: Ges Boutique RN - Android APK
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: 22.16.0
      java: 17

    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps

      - name: Accept Android licenses + install NDK
        script: |
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "ndk;27.1.12297006" || true

      - name: Expo prebuild Android
        script: npx expo prebuild --platform android --clean

      - name: Configure Android SDK path
        script: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Build Android APK Release
        script: |
          KEYSTORE_PATH="$(pwd)/android/app/release.keystore"
          keytool -genkey -v \
            -keystore "$KEYSTORE_PATH" \
            -storepass gesboutique \
            -alias gesboutique \
            -keypass gesboutique \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Ges Boutique,O=MaigaConsulting,C=ML"
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.build.abi=arm64-v8a \
            -Pandroid.injected.signing.store.file="$KEYSTORE_PATH" \
            -Pandroid.injected.signing.store.password=gesboutique \
            -Pandroid.injected.signing.key.alias=gesboutique \
            -Pandroid.injected.signing.key.password=gesboutique

    artifacts:
      - android/app/build/outputs/apk/release/app-release.apk

    publishing:
      email:
        recipients:
          - doumaiga3@gmail.com
        notify:
          success: true
          failure: true
