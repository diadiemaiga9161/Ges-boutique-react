workflows:

  android-workflow:
    name: Ges Boutique RN - Android APK
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: 22.16.0
      java: 17

    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps

      - name: Accept Android licenses + install NDK
        script: |
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "ndk;27.1.12297006" || true

      - name: Expo prebuild Android
        script: npx expo prebuild --platform android --clean

      - name: Configure Android SDK path
        script: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Build Android APK Debug (bundle JS inclus)
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon \
            -Pandroid.injected.build.abi=arm64-v8a \
            -PbundleInDebug=true

      - name: Copier APK a la racine
        script: |
          APK=$(find android -name "*.apk" | head -1)
          echo "APK trouvé: $APK"
          cp "$APK" ges-boutique.apk
          ls -lh ges-boutique.apk

    artifacts:
      - ges-boutique.apk

    publishing:
      email:
        recipients:
          - doumaiga3@gmail.com
        notify:
          success: true
          failure: true
