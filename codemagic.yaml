workflows:

  android-workflow:
    name: Ges Boutique RN - Android APK Release
    max_build_duration: 90
    instance_type: mac_mini_m2

    environment:
      node: 22.16.0
      java: 17
      groups:
        - android-signing

    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps

      - name: Accept Android licenses + install NDK
        script: |
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "ndk;27.1.12297006" || true

      - name: Expo prebuild Android
        script: npx expo prebuild --platform android --clean

      - name: Configure Android SDK path
        script: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Restaurer keystore depuis secret Codemagic
        script: |
          echo "$KEYSTORE_BASE64" | base64 --decode > ges-boutique.keystore
          ls -lh ges-boutique.keystore

      - name: Build APK release (signature via proprietes Gradle)
        script: |
          cd android
          chmod +x gradlew
          KEYSTORE_PATH=$(cd .. && pwd)/ges-boutique.keystore
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="$KEYSTORE_PATH" \
            -Pandroid.injected.signing.store.password="GesBoutique2025" \
            -Pandroid.injected.signing.key.alias="ges-boutique" \
            -Pandroid.injected.signing.key.password="GesBoutique2025" \
            --no-daemon 2>&1
          echo "=== APK produits ==="
          find . -name "*.apk" | sort

      - name: Copier APK a la racine
        script: |
          APK=$(find android -name "*.apk" -path "*/release/*" | head -1)
          if [ -z "$APK" ]; then
            APK=$(find android -name "*.apk" | head -1)
          fi
          if [ -z "$APK" ]; then
            echo "ERREUR: Aucun APK trouve"
            find android -name "*.apk" || true
            exit 1
          fi
          echo "APK trouve: $APK"
          cp "$APK" ges-boutique.apk
          ls -lh ges-boutique.apk

    artifacts:
      - ges-boutique.apk
      - android/app/build/outputs/apk/**/*.apk

    publishing:
      email:
        recipients:
          - doumaiga3@gmail.com
        notify:
          success: true
          failure: true
