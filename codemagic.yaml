workflows:

  android-workflow:
    name: Ges Boutique RN - Android APK Release
    max_build_duration: 90
    instance_type: mac_mini_m2

    environment:
      node: 22.16.0
      java: 17
      groups:
        - android-signing

    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps

      - name: Accept Android licenses + install NDK
        script: |
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "ndk;27.1.12297006" || true

      - name: Expo prebuild Android
        script: npx expo prebuild --platform android --clean

      - name: Configure Android SDK path
        script: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Diagnostic structure Android
        script: |
          echo "=== Java version ==="
          java -version
          echo "=== Contenu android/ ==="
          ls -la android/ || echo "Pas de dossier android/"
          echo "=== Taches Gradle disponibles ==="
          cd android && chmod +x gradlew && ./gradlew tasks --no-daemon 2>&1 | grep -i "assemble\|build\|apk" | head -20

      - name: Build APK debug
        script: |
          cd android
          ./gradlew assembleDebug --no-daemon --info 2>&1 | tail -50
          EXIT_CODE=${PIPESTATUS[0]}
          echo "=== Exit code Gradle: $EXIT_CODE ==="
          echo "=== Recherche APK ==="
          find . -name "*.apk" -type f | sort
          exit $EXIT_CODE

      - name: Copier APK a la racine
        script: |
          APK=$(find android -name "*debug*.apk" | head -1)
          if [ -z "$APK" ]; then
            APK=$(find android -name "*.apk" | head -1)
          fi
          if [ -z "$APK" ]; then
            echo "ERREUR: Aucun APK trouve"
            find android -type f -name "*.apk" || true
            exit 1
          fi
          echo "APK trouve: $APK"
          cp "$APK" ges-boutique-debug.apk
          ls -lh ges-boutique-debug.apk

    artifacts:
      - ges-boutique-debug.apk
      - android/app/build/outputs/apk/**/*.apk

    publishing:
      email:
        recipients:
          - doumaiga3@gmail.com
        notify:
          success: true
          failure: true
